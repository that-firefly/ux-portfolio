<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      property="og:title"
      content="Make Tax Digital (MTD) – UX Case Study"
    />
    <meta
      property="og:description"
      content="Improving HMRC digital services through user-centred design, research, and prototyping."
    />
    <meta
      property="og:image"
      content="https://thatfirefly.com/images/HMRC-images/mtd-preview.jpg"
    />
    <meta property="og:url" content="https://thatfirefly.com/hmrc-project" />
    <meta property="og:type" content="website" />
    <title>Estela Gaspar – UX/UI Designer - HMRC Government</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Estela Gaspar favicon -->
    <link rel="icon" href="./images/favicon-16x16.png" type="image/png" />
    <link
      rel="icon"
      type="image/png"
      href="./images/favicon-32x32.png"
      sizes="32x32"
    />
    <link
      rel="icon"
      type="image/png"
      href="./images/favicon-16x16.png"
      sizes="16x16"
    />

    <style>
      :root {
        --bg: #fcfcfc;
        --surface: #ffffff;
        --text: #1a1a1a;
        --muted: #667085;
        --border: #e9eaeb;
        --shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
        --radius: 16px;
        --container: 940px;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        font-family: "Poppins", sans-serif;
        font-size: 16px;
        line-height: 1.65;
        background: var(--bg);
        color: var(--text);
      }

      img {
        display: block;
        max-width: 100%;
        height: auto;
        border-radius: 14px;
      }

      .img-small {
        width: 50%;
        padding: 10px 0px;
        margin: 0px 0px 40px 0px;
        border-radius: 50px;
      }

      a {
        color: #1b5e20;
        overflow-wrap: anywhere;
      }

      a:active,
      a:link {
        color: #1b5e20;
        overflow-wrap: anywhere;
      }

      a:hover {
        color: #388e3c;
        overflow-wrap: anywhere;
      }

      a:visited {
        color: #8052b8;
        overflow-wrap: anywhere;
      }

      .secondary-button {
        color: #000000;
        padding: 10px;
        border: 3px solid #000000;
        border-radius: 50px;
        text-decoration: none;
      }

      .secondary-button:visited {
        color: #000000;
      }

      p,
      li {
        overflow-wrap: anywhere;
      }

      main.container {
        max-width: var(--container);
        margin: 0 auto;
        padding: 24px 20px 72px;
      }

      .back-btn,
      .back-link {
        margin: 20px 0px;
      }

      .back-btn a,
      .back-link a {
        text-decoration: none;
        color: var(--muted);
        font-weight: 500;
      }

      .ready-print {
        display: inline-block;
        margin: 0 0 24px;
        padding: 10px 14px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #111;
        background: #fff;
        border: 1.5px solid #111;
        border-radius: 999px;
        cursor: pointer;
        transition: 0.2s ease;
      }

      .ready-print:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
      }

      h1,
      h2,
      h3,
      h4 {
        margin: 0;
        line-height: 1.2;
        color: #111827;
      }

      h1 {
        font-size: clamp(2rem, 4vw, 3rem);
        margin-bottom: 24px;
      }

      h2 {
        font-size: clamp(1.35rem, 2vw, 1.8rem);
        margin: 0 0 14px;
      }

      h3 {
        font-size: 1.1rem;
        margin: 24px 0 10px;
      }

      h4 {
        font-size: 1rem;
        margin: 20px 0 10px;
      }

      p {
        margin: 0 0 16px;
      }

      ul,
      ol {
        margin: 0 0 16px 1.2rem;
        padding: 0;
      }

      li {
        margin-bottom: 10px;
      }

      .section {
        margin: 50px 0px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 28px;
        box-shadow: var(--shadow);
      }

      .case-section {
        display: inline-block;
        margin-top: 20px;
        font-size: 1.2rem;
        font-weight: 600;
        color: #000000;
      }

      .img-xl {
        width: 100%;
        margin: 24px 0;
      }

      .label-text,
      .muted,
      .disclaimer {
        font-size: 0.95rem;
        color: var(--muted);
      }

      @media (max-width: 900px) {
        .section {
          padding: 22px 18px;
        }

        h1 {
          margin-bottom: 20px;
        }

        h2 {
          margin-top: 32px;
        }

        .ready-print {
          width: 100%;
          text-align: center;
        }

        br {
          display: none;
        }
      }

      @media print {
        body {
          background: #fff;
        }

        .section {
          box-shadow: none;
          border: none;
          padding: 0;
        }

        .ready-print,
        .back-btn,
        .back-link {
          display: none;
        }

        .case-section {
          background: #000 !important;
          color: #fff !important;
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
          padding: 4px 10px;
          border-radius: 8px;
        }

        a::after {
          content: " (" attr(href) ")";
          font-size: 0.85em;
          color: #666;
        }
      }
    </style>
  </head>

  <body>
    <main class="container">
      <div class="back-btn">
        <a href="javascript:history.back()">← Back</a>
      </div>

      <div class="section">
        <h1>Prototype samples</h1>
        <h2>Gov.UK prototype kit using Heroku</h2>
        <p>govuk-prototype-layouts</p>
        <img
          class="img-small"
          src="./images/prototype-samples/prototype-sample-1.png"
          alt="prototype sample"
          title="Image of a Gov.UK prototype kit using Heroku"
        />
        <p>
          <a
            class="secondary-button"
            href="https://govuk-prototype-layouts-2385fbfb2195.herokuapp.com"
            >Go to prototype</a
          >
        </p>
        <p>password: anexample-icreated#estela</p>
      </div>

      <div class="section">
        <h2>Gov.UK prototype kit using Render</h2>
        <p>govuk-prototype-layouts</p>
        <img
          class="img-small"
          src="./images/prototype-samples/prototype-sample-2.png"
          alt="prototype sample"
          title="Image of a Gov.UK prototype kit using Render"
        />
        <p>
          <a
            class="secondary-button"
            href="https://spacetravelservice.onrender.com"
            >Go to prototype</a
          >
        </p>
        <p>password: demo2811</p>
      </div>

      <section class="back-link">
        <a href="./case-studies.html">← Back to case studies</a>
      </section>
    </main>
  </body>
</html>
